[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "python-power-package"
version = "0.1.0"
authors = [
  { name="Antigravity", email="ai@google.com" },
]
description = "A standard-compliant python package blueprint"
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests >= 2.28.0",
]

[project.urls]
"Homepage" = "https://github.com/syahputrawork98-sketch/Python-Knowledge-Base"
"Bug Tracker" = "https://github.com/syahputrawork98-sketch/Python-Knowledge-Base/issues"

[tool.setuptools.packages.find]
where = ["src"]
