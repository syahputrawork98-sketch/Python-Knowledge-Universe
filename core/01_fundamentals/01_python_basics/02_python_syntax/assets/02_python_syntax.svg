<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8f9fa; }
      .box { rx: 6px; ry: 6px; stroke-width: 2px; }
      .text-title { font-family: sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
      .text-body { font-family: sans-serif; font-size: 14px; fill: #555; }
      .text-mono { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; }
      
      /* Colors */
      .bg-statement { fill: #e3f2fd; stroke: #1e88e5; }
      .bg-block { fill: #fff8e1; stroke: #ffb300; }
      .bg-comment { fill: #e8f5e9; stroke: #43a047; }
      .col-statement { fill: #1e88e5; }
      .col-block { fill: #f57c00; }
      .col-comment { fill: #2e7d32; font-style: italic; }
      
      .line-indent { stroke: #ffb300; stroke-width: 2px; stroke-dasharray: 4; }
      .line-main { stroke: #bdc3c7; stroke-width: 2px; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="500" class="bg" />

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">Visualisasi Tata Bahasa Python</text>
  <text x="450" y="65" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7f8c8d" font-style="italic">Satu Garis Vertikal, 4 Spasi Menjorok, dan Tanda Pagar Komentar</text>

  <!-- =============================== -->
  <!-- LEFT PANEL: KODE                -->
  <!-- =============================== -->
  <rect x="50" y="100" width="450" height="350" class="box" fill="#2d2d2d" stroke="#111" />
  
  <!-- Red, Green, Yellow macOS dots -->
  <circle cx="70" cy="120" r="6" fill="#ff5f56" />
  <circle cx="90" cy="120" r="6" fill="#ffbd2e" />
  <circle cx="110" cy="120" r="6" fill="#27c93f" />
  <text x="275" y="125" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">contoh_resep.py</text>

  <rect x="50" y="140" width="450" height="1" fill="#444" />

  <!-- Code Lines -->
  <!-- Main vertical guideline -->
  <line x1="80" y1="150" x2="80" y2="430" class="line-main" />

  <!-- Line 1: Comment -->
  <text x="90" y="180" class="text-mono col-comment"># Tentukan batas keamanan</text>
  
  <!-- Line 2: Statement -->
  <text x="90" y="210" class="text-mono col-statement">batas_umur = 18</text>

  <!-- Line 3: Statement (if) -->
  <text x="90" y="250" class="text-mono col-statement">if umur > batas_umur:</text>

  <!-- Line 4 & 5: BLOCK (Indented) -->
  <!-- Indent Guide -->
  <line x1="120" y1="260" x2="120" y2="340" class="line-indent" />
  <!-- '....' spacing abstraction -->
  <text x="85" y="280" class="text-mono" fill="#666">・・・・</text>
  <text x="130" y="280" class="text-mono col-block">print("Selamat Datang!")</text>
  
  <text x="85" y="310" class="text-mono" fill="#666">・・・・</text>
  <text x="130" y="310" class="text-mono col-block">ijin_masuk = True</text>

  <!-- Line 6: Comment Indented -->
  <text x="85" y="340" class="text-mono" fill="#666">・・・・</text>
  <text x="130" y="340" class="text-mono col-comment"># Blok berakhir di sini</text>

  <!-- Line 7: Statement (Main flow) -->
  <text x="90" y="390" class="text-mono col-statement">print("Pemeriksaan selesai.")</text>


  <!-- =============================== -->
  <!-- RIGHT PANEL: PENJELASAN         -->
  <!-- =============================== -->
  
  <!-- Legend 1: Komentar -->
  <svg x="530" y="155">
    <rect x="0" y="0" width="320" height="50" class="box bg-comment" />
    <text x="10" y="22" class="text-title" font-size="16">1. Komentar (#)</text>
    <text x="10" y="40" class="text-body">1 Baris pesan diabaikan Interpreter.</text>
    <!-- arrow pointing to script -->
    <path d="M 0 10 L -45 10" stroke="#43a047" stroke-width="2" marker-end="url(#arrowhead)" />
  </svg>

  <!-- Legend 2: Statement -->
  <svg x="530" y="220">
    <rect x="0" y="0" width="320" height="50" class="box bg-statement" />
    <text x="10" y="22" class="text-title" font-size="16">2. Statement (Instruksi Utama)</text>
    <text x="10" y="40" class="text-body">Setara, memanjang urut dari garis utama (kiri).</text>
    <!-- arrow pointing to script -->
    <path d="M 0 15 L -40 15" stroke="#1e88e5" stroke-width="2" marker-end="url(#arrowhead)" />
  </svg>

  <!-- Legend 3: Blok Kode (Indent) -->
  <svg x="530" y="285">
    <rect x="0" y="0" width="320" height="85" class="box bg-block" />
    <text x="10" y="22" class="text-title" font-size="16">3. Blok Kode Berhierarki</text>
    <text x="10" y="42" class="text-body" font-weight="bold">Indentasi 4 Spasi.</text>
    <text x="10" y="60" class="text-body">Menandakan mereka anak buah/milik</text>
    <text x="10" y="75" class="text-body">pernyataan persis di batas atasnya.</text>
    <!-- arrow pointing to script -->
    <path d="M 0 10 L -40 10" stroke="#ffb300" stroke-width="2" marker-end="url(#arrowhead)" />
  </svg>

  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
  </marker>

</svg>
