<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8f9fa; }
      .box { rx: 8px; ry: 8px; stroke-width: 2px; }
      .text-title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
      .text-subtitle { font-family: sans-serif; font-size: 16px; font-style: italic; fill: #34495e; }
      .text-code { font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: bold; }
      .text-node { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #fff; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #555; }
      
      /* Types */
      .bg-operand { fill: #bbdefb; stroke: #1976d2; }
      .bg-operator { fill: #ef5350; stroke: #c62828; }
      .bg-result { fill: #81c784; stroke: #2e7d32; }
      
      .link-line { stroke: #546e7a; stroke-width: 3px; marker-end: url(#arrowhead); }
      .link-dashed { stroke: #afb42b; stroke-width: 3px; stroke-dasharray: 6; }
    </style>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="600" class="bg" />

  <!-- Global Title -->
  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">Anatomi Expression &amp; Hierarki Precedence</text>
  <text x="450" y="65" text-anchor="middle" class="text-subtitle">Membongkar rahasia mesin penerjemah Koki saat membaca: 2 + 3 * 4</text>

  <!-- ============================================== -->
  <!-- TOP HALF: PRECEDENCE ILLUSTRATION (Syntax Tree)  -->
  <!-- ============================================== -->
  <rect x="50" y="90" width="800" height="300" class="box" fill="#ffffff" stroke="#ccc" />
  
  <text x="70" y="125" class="text-title">Struktur Baca Mesin Koki (AST / Abstract Syntax Tree)</text>
  <rect x="70" y="140" width="160" height="40" class="box" fill="#2d2d2d" stroke="#111" />
  <text x="150" y="166" text-anchor="middle" class="text-code" fill="#a6e22e">2 + 3 * 4</text>

  <!-- Tree Graph -->
  <!-- Operator ROOT (+) -->
  <rect x="420" y="120" width="60" height="60" rx="30" ry="30" class="bg-operator" stroke-width="3" />
  <text x="450" y="158" text-anchor="middle" class="text-node">+</text>
  <text x="500" y="145" class="text-desc" font-weight="bold" fill="#c62828">(Eksekusi Terakhir)</text>

  <!-- Left branch of (+) -> 2 -->
  <path d="M 430 170 L 330 220" class="link-line" fill="none" />
  
  <rect x="290" y="220" width="60" height="50" class="box bg-operand" />
  <text x="320" y="252" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#0d47a1">2</text>
  <text x="240" y="250" class="text-desc" fill="#1976d2">Bahan C</text>

  <!-- Right branch of (+) -> (*) Operator -->
  <path d="M 470 170 L 580 220" class="link-line" fill="none" />

  <!-- Operator (*) -->
  <rect x="550" y="220" width="60" height="60" rx="30" ry="30" class="bg-operator" stroke-width="3" />
  <text x="580" y="265" text-anchor="middle" class="text-node">*</text>
  <text x="630" y="255" class="text-desc" font-weight="bold" fill="#c62828">(Eksekusi PERTAMA)</text>

  <!-- Left branch of (*) -> 3 -->
  <path d="M 560 270 L 480 320" class="link-line" fill="none" />
  <rect x="450" y="320" width="60" height="50" class="box bg-operand" />
  <text x="480" y="352" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#0d47a1">3</text>
  <text x="415" y="350" class="text-desc" fill="#1976d2">Bahan A</text>

  <!-- Right branch of (*) -> 4 -->
  <path d="M 600 270 L 680 320" class="link-line" fill="none" />
  <rect x="650" y="320" width="60" height="50" class="box bg-operand" />
  <text x="680" y="352" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#0d47a1">4</text>
  <text x="725" y="350" class="text-desc" fill="#1976d2">Bahan B</text>

  <!-- Visualizing the reduction mechanics -->
  <path d="M 580 390 L 580 350" stroke="#afb42b" stroke-width="3" fill="none" marker-start="url(#arrowhead)"/>
  <rect x="550" y="390" width="60" height="50" class="box bg-result" />
  <text x="580" y="422" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#1b5e20">12</text>
  <text x="625" y="420" class="text-desc" fill="#2e7d32">Langkah 1: Wujud Tunggal Transisi</text>


  <!-- ============================================== -->
  <!-- BOTTOM HALF: SHORT CIRCUIT ILLUSTRATION          -->
  <!-- ============================================== -->
  <rect x="50" y="415" width="410" height="150" class="box" fill="#ffffff" stroke="#ccc" />
  
  <rect x="60" y="430" width="160" height="40" class="box" fill="#2d2d2d" stroke="#111" />
  <text x="140" y="456" text-anchor="middle" class="text-code" fill="#66d9ef">False and ...</text>

  <!-- Concept Title -->
  <text x="70" y="500" class="text-title">Trik Short-Circuit</text>
  <text x="70" y="520" class="text-desc" font-weight="bold">Jika memakai "and":</text>
  <text x="70" y="540" class="text-desc" font-style="italic">Karena syarat sisi Kiri patah (False), Koki MALAS</text>
  <text x="70" y="555" class="text-desc" font-style="italic">membaca/menjalankan perintah di sisi kanannya.</text>

</svg>
