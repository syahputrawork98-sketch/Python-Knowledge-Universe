<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <text x="220" y="40" font-family="Arial" font-size="24" fill="#1e293b" font-weight="bold">SABUK ALAT STANDAR (BUILT-IN)</text>

  <!-- The Toolbelt -->
  <rect x="50" y="450" width="700" height="60" rx="10" fill="#475569" stroke="#1e293b" stroke-width="2" />
  <text x="320" y="540" font-family="Arial" font-size="16" fill="#475569" font-weight="bold">BUILT-IN SCOPE (Paling Luar)</text>

  <!-- Slots and Tools -->
  
  <!-- Tools 1: Measuring -->
  <g transform="translate(100, 380)">
    <rect width="80" height="80" rx="5" fill="#fde68a" stroke="#d97706" />
    <text x="15" y="45" font-family="Arial" font-size="14" fill="#92400e" font-weight="bold">len()</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#92400e">Meteran</text>
  </g>

  <g transform="translate(200, 380)">
    <rect width="80" height="80" rx="5" fill="#fde68a" stroke="#d97706" />
    <text x="15" y="45" font-family="Arial" font-size="14" fill="#92400e" font-weight="bold">sum()</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#92400e">Timbangan</text>
  </g>

  <!-- Tools 2: Identification -->
  <g transform="translate(350, 380)">
    <rect width="80" height="80" rx="5" fill="#bae6fd" stroke="#0284c7" />
    <text x="15" y="45" font-family="Arial" font-size="14" fill="#0369a1" font-weight="bold">type()</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#0369a1">Scanner</text>
  </g>

  <g transform="translate(450, 380)">
    <rect width="80" height="80" rx="5" fill="#bae6fd" stroke="#0284c7" />
    <text x="15" y="45" font-family="Arial" font-size="14" fill="#0369a1" font-weight="bold">dir()</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#0369a1">Inspeksi</text>
  </g>

  <!-- Tools 3: Sorting/Looping -->
  <g transform="translate(600, 380)">
    <rect width="100" height="80" rx="5" fill="#dcfce7" stroke="#16a34a" />
    <text x="10" y="45" font-family="Arial" font-size="14" fill="#166534" font-weight="bold">range()</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#166534">Mesin Cetak</text>
  </g>

  <!-- Interaction Symbols -->
  <circle cx="400" cy="200" r="50" fill="#3b82f6" opacity="0.1" />
  <path d="M 400 100 L 400 350" stroke="#3b82f6" stroke-width="4" stroke-dasharray="10,5" marker-end="url(#arrow_blue)" />
  <text x="410" y="150" font-family="Arial" font-size="14" fill="#3b82f6" font-weight="bold">PANGGIL LANGSUNG</text>
  <text x="410" y="170" font-family="Arial" font-size="12" fill="#64748b">(Tanpa Import)</text>

  <defs>
    <marker id="arrow_blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="320" y="580" font-family="Arial" font-size="14" fill="#94a3b8">© Python Knowledge Universe - Standard Toolbox</text>
</svg>
