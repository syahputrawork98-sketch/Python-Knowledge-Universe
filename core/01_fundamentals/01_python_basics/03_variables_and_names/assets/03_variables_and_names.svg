<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8f9fa; }
      .box { rx: 8px; ry: 8px; stroke-width: 2px; }
      .text-title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
      .text-subtitle { font-family: sans-serif; font-size: 16px; font-style: italic; fill: #34495e; }
      .text-code { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #555; }
      
      /* Entities */
      .bg-label { fill: #fff9c4; stroke: #fbc02d; }
      .bg-val-imm { fill: #bbdefb; stroke: #1976d2; }
      .bg-val-mut { fill: #ffccbc; stroke: #d84315; }
      
      .link-line { stroke: #546e7a; stroke-width: 3px; marker-end: url(#arrowhead); }
      .link-line-dashed { stroke: #d32f2f; stroke-width: 3px; stroke-dasharray: 6; marker-end: url(#arrowhead); }
    </style>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="600" class="bg" />

  <!-- Global Title -->
  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">Variabel: Stiker Nama vs Objek Gudang</text>
  <text x="450" y="65" text-anchor="middle" class="text-subtitle">Di Python, Variabel hanya "menempel" (Reference Binding) ke Nilai, BUKAN menyimpannya.</text>

  <!-- ============================================== -->
  <!-- SECTION 1: IMMUTABLE DUAL ALIASING (Top Half)    -->
  <!-- ============================================== -->
  <rect x="50" y="100" width="800" height="200" class="box" fill="#ffffff" stroke="#e0e0e0" />
  <text x="70" y="130" class="text-title">1. Name Binding Sederhana (Tipe Immutable / Kaku)</text>
  
  <!-- Code Snippet -->
  <rect x="70" y="150" width="150" height="110" class="box" fill="#2d2d2d" stroke="#111" />
  <text x="85" y="180" class="text-code" fill="#a6e22e">x = 10</text>
  <text x="85" y="210" class="text-code" fill="#a6e22e">y = x</text>
  <text x="85" y="240" class="text-code" fill="#a6e22e">x = 11</text>

  <!-- Visual State 1: x and y point to 10 -->
  <rect x="350" y="160" width="80" height="40" class="box bg-label" />
  <text x="390" y="186" text-anchor="middle" class="text-code">y (Stiker)</text>

  <rect x="520" y="160" width="100" height="60" class="box bg-val-imm" />
  <text x="570" y="196" text-anchor="middle" class="text-code" font-size="20">10 (Benda)</text>

  <path d="M 430 180 L 510 180" class="link-line" fill="none" />

  <!-- Visual State 2: x is moved to 11 -->
  <rect x="350" y="230" width="80" height="40" class="box bg-label" />
  <text x="390" y="256" text-anchor="middle" class="text-code">x (Stiker)</text>

  <rect x="520" y="230" width="100" height="60" class="box bg-val-imm" />
  <text x="570" y="266" text-anchor="middle" class="text-code" font-size="20">11 (Benda)</text>

  <path d="M 430 250 L 510 250" class="link-line" fill="none" />
  <path d="M 430 240 Q 480 200 510 190" class="link-line-dashed" fill="none" stroke-opacity="0.3"/>
  <text x="650" y="170" class="text-desc" font-weight="bold">Langkah:</text>
  <text x="650" y="190" class="text-desc">a. 'y' menempel ke angka 10</text>
  <text x="650" y="210" class="text-desc">b. 'x' yang tadinya menempel di 10,</text>
  <text x="650" y="230" class="text-desc">   tercabut paksa lalu menempel</text>
  <text x="650" y="250" class="text-desc">   ke batu baru berbentuk angka 11.</text>

  <!-- ============================================== -->
  <!-- SECTION 2: MUTABLE ALIASING (Bottom Half)        -->
  <!-- ============================================== -->
  <rect x="50" y="320" width="800" height="240" class="box" fill="#ffffff" stroke="#e0e0e0" />
  <text x="70" y="350" class="text-title">2. Jebakan Aliasing (Tipe Mutable / Fleksibel seperti List)</text>

  <!-- Code Snippet -->
  <rect x="70" y="370" width="190" height="80" class="box" fill="#2d2d2d" stroke="#111" />
  <text x="85" y="400" class="text-code" fill="#a6e22e">a = [1, 2]</text>
  <text x="85" y="430" class="text-code" fill="#a6e22e">b = a</text>

  <rect x="70" y="470" width="190" height="70" class="box" fill="#fafafa" stroke="#d84315" stroke-dasharray="4"/>
  <text x="85" y="495" font-family="sans-serif" font-size="12" fill="#d84315" font-weight="bold">WARNING (Mutasi Bersama):</text>
  <text x="85" y="520" class="text-code" fill="#333">b.append(3)</text>
  
  <!-- Visuals -->
  <rect x="350" y="370" width="80" height="40" class="box bg-label" />
  <text x="390" y="396" text-anchor="middle" class="text-code">a (Stiker)</text>

  <rect x="350" y="430" width="80" height="40" class="box bg-label" />
  <text x="390" y="456" text-anchor="middle" class="text-code">b (Stiker)</text>

  <rect x="520" y="390" width="140" height="60" class="box bg-val-mut" />
  <text x="590" y="426" text-anchor="middle" class="text-code" font-size="18">[ 1,  2, <tspan fill="#d84315"> 3 </tspan>]</text>

  <path d="M 430 390 L 510 410" class="link-line" fill="none" />
  <path d="M 430 450 L 510 430" class="link-line" fill="none" />

  <text x="690" y="380" class="text-desc" font-weight="bold">Hasil Akhir:</text>
  <text x="690" y="400" class="text-desc">Karena 'a' dan 'b' menempel</text>
  <text x="690" y="420" class="text-desc">pada satu Papan Tulis yang sama,</text>
  <text x="690" y="440" class="text-desc">aksi menambahkan "3" menggunakan</text>
  <text x="690" y="460" class="text-desc">stiker (b) membuat siapapun yang</text>
  <text x="690" y="480" class="text-desc">memeriksa isi stiker (a) akan kaget</text>
  <text x="690" y="500" class="text-desc">karena nilainya ikut berubah total!</text>

</svg>
