<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8f9fa; }
      .box { rx: 8px; ry: 8px; stroke-width: 2px; }
      .text-title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
      .text-subtitle { font-family: sans-serif; font-size: 16px; font-style: italic; fill: #34495e; }
      .text-code { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; }
      .text-body { font-family: sans-serif; font-size: 13px; fill: #444; }
      
      /* Types */
      .bg-int { fill: #bbdefb; stroke: #1976d2; }
      .bg-float { fill: #e1bee7; stroke: #8e24aa; }
      .bg-str { fill: #c8e6c9; stroke: #388e3c; }
      .bg-bool { fill: #ffecb3; stroke: #ffa000; }
      
      .arrow-casting { stroke: #d32f2f; stroke-width: 3px; stroke-dasharray: 4; marker-end: url(#arrowhead); }
      .arrow-result { stroke: #2e7d32; stroke-width: 3px; marker-end: url(#arrowhead); }
      
      .op-circle { fill: #fff; stroke: #ff5722; stroke-width: 3px; r: 15; }
    </style>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="600" class="bg" />

  <!-- Global Title -->
  <text x="450" y="40" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">Anatomi Data dan Type Casting</text>
  <text x="450" y="65" text-anchor="middle" class="text-subtitle">Bagaimana Mesin Giling Python mengubah "Kertas Teks" menjadi "Angka Matematika"</text>

  <!-- ============================================== -->
  <!-- LEFT COLUMN: RAW INGREDIENTS (Wujud Asli)      -->
  <!-- ============================================== -->
  <rect x="40" y="100" width="220" height="460" class="box" fill="#ffffff" stroke="#ccc" />
  <text x="150" y="130" text-anchor="middle" class="text-title">Bahan Baku Mentah</text>

  <!-- str -->
  <rect x="60" y="160" width="180" height="80" class="box bg-str" />
  <text x="150" y="185" text-anchor="middle" class="text-code" fill="#1b5e20">"18"</text>
  <text x="150" y="210" text-anchor="middle" font-family="sans-serif" font-size="20">Kertas (str)</text>
  <text x="150" y="230" text-anchor="middle" class="text-body" fill="#1b5e20">Berisi Karakter Angka 1 dan 8</text>

  <!-- int -->
  <rect x="60" y="260" width="180" height="80" class="box bg-int" />
  <text x="150" y="285" text-anchor="middle" class="text-code" fill="#0d47a1">12</text>
  <text x="150" y="310" text-anchor="middle" font-family="sans-serif" font-size="20">Telur Utuh (int)</text>
  <text x="150" y="330" text-anchor="middle" class="text-body" fill="#0d47a1">Bisa ditambah/dikurang</text>

  <!-- float -->
  <rect x="60" y="360" width="180" height="80" class="box bg-float" />
  <text x="150" y="385" text-anchor="middle" class="text-code" fill="#4a148c">3.14</text>
  <text x="150" y="410" text-anchor="middle" font-family="sans-serif" font-size="20">Air Kaldu (float)</text>
  <text x="150" y="430" text-anchor="middle" class="text-body" fill="#4a148c">Toleransi Pecahan Desimal</text>

  <!-- ============================================== -->
  <!-- MIDDLE COLUMN: TYPE CASTING & OPERATIONS       -->
  <!-- ============================================== -->
  
  <!-- Scenario 1: ERROR (String + Int) -->
  <rect x="330" y="130" width="240" height="110" class="box" fill="#ffebee" stroke="#f44336" stroke-dasharray="3"/>
  <text x="450" y="155" text-anchor="middle" class="text-title" fill="#c62828">Mesin Macet (Error)</text>
  <text x="450" y="180" text-anchor="middle" class="text-code" fill="#b71c1c">"18" + 12</text>
  <text x="450" y="200" text-anchor="middle" class="text-body" fill="#b71c1c">TypeError! Python menolak</text>
  <text x="450" y="215" text-anchor="middle" class="text-body" fill="#b71c1c">mencampur kertas dan telur.</text>

  <path d="M 240 200 L 320 180" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 240 300 L 320 200" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Scenario 2: CASTING SOLUSI -->
  <path d="M 240 200 Q 300 240 380 300" class="arrow-casting" fill="none"/>
  
  <rect x="380" y="280" width="140" height="60" class="box" fill="#2d2d2d" stroke="#111" />
  <text x="450" y="305" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Mesin Giling int()</text>
  <text x="450" y="325" text-anchor="middle" class="text-code" fill="#4caf50">int("18")</text>

  <!-- Resulting valid Int -->
  <path d="M 520 310 L 600 310" class="arrow-result" fill="none" />


  <!-- ============================================== -->
  <!-- RIGHT COLUMN: HASIL MATEMATIKA VALID           -->
  <!-- ============================================== -->
  
  <rect x="610" y="280" width="100" height="60" class="box bg-int" />
  <text x="660" y="305" text-anchor="middle" class="text-code" fill="#0d47a1">18</text>
  <text x="660" y="325" text-anchor="middle" class="text-body" fill="#0d47a1">Data Telur Asli</text>

  <!-- Math Operation -->
  <text x="730" y="315" font-family="sans-serif" font-size="40" font-weight="bold" fill="#ff5722">+</text>
  
  <path d="M 240 300 Q 400 380 720 380 L 720 330" stroke="#1976d2" stroke-width="2" fill="none" stroke-dasharray="2" marker-end="url(#arrowhead)"/>
  <rect x="740" y="340" width="80" height="30" class="box bg-int"/>
  <text x="780" y="360" text-anchor="middle" class="text-code" fill="#0d47a1">12 Asli</text>

  <rect x="610" y="380" width="230" height="70" class="box" fill="#e8f5e9" stroke="#388e3c" />
  <text x="725" y="405" text-anchor="middle" class="text-title" fill="#2e7d32">Hasil Akhir Kalkulasi</text>
  <text x="725" y="435" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#2e7d32">30</text>
  
  <path d="M 740 320 L 740 375" class="arrow-result" fill="none"/>

</svg>
