<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />

  <!-- LEGB House Structure -->
  <!-- Built-in (B) - The Foundation -->
  <rect x="50" y="50" width="700" height="500" rx="15" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" />
  <text x="70" y="80" font-family="Arial" font-size="18" fill="#94a3b8" font-weight="bold">BUILT-IN SCOPE (B)</text>
  <text x="70" y="100" font-family="Arial" font-size="12" fill="#94a3b8">len(), print(), etc.</text>

  <!-- Global (G) - The House -->
  <rect x="100" y="120" width="600" height="400" rx="15" fill="#e2e8f0" stroke="#64748b" stroke-width="2" />
  <text x="120" y="150" font-family="Arial" font-size="18" fill="#475569" font-weight="bold">GLOBAL SCOPE (G)</text>
  <text x="120" y="170" font-family="Arial" font-size="12" fill="#64748b">main.py level variables</text>

  <!-- Enclosing (E) - The Living Room -->
  <rect x="150" y="190" width="500" height="300" rx="15" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
  <text x="170" y="220" font-family="Arial" font-size="18" fill="#1e293b" font-weight="bold">ENCLOSING SCOPE (E)</text>
  <text x="170" y="240" font-family="Arial" font-size="12" fill="#475569">Variable from outer function</text>

  <!-- Local (L) - The Bedroom -->
  <rect x="200" y="260" width="400" height="200" rx="15" fill="#94a3b8" stroke="#1e293b" stroke-width="2" />
  <text x="220" y="290" font-family="Arial" font-size="18" fill="white" font-weight="bold">LOCAL SCOPE (L)</text>
  <text x="220" y="310" font-family="Arial" font-size="12" fill="white">Variable inside current function</text>

  <!-- Lambda Sticker (Quick Function) -->
  <rect x="500" y="320" width="180" height="100" rx="5" fill="#fbbf24" stroke="#d97706" stroke-width="3" transform="rotate(5 590 370)" />
  <text x="515" y="350" font-family="Arial" font-size="16" fill="#92400e" font-weight="bold">LAMBDA</text>
  <text x="515" y="375" font-family="Courier New" font-size="14" fill="#92400e">lambda x: x*2</text>
  <text x="515" y="400" font-family="Arial" font-size="12" fill="#d97706" font-style="italic">"Anonymous &amp; Fast"</text>

  <!-- Search Arrow (LEGB Rule) -->
  <path d="M 250 420 L 250 80" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#redarrowhead)" />
  <text x="265" y="110" font-family="Arial" font-size="14" fill="#ef4444" font-weight="bold">Lookup Order (LEGB)</text>

  <defs>
    <marker id="redarrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="280" y="580" font-family="Arial" font-size="14" fill="#94a3b8">© Python Knowledge Universe - Scope &amp; Lambda</text>
</svg>
