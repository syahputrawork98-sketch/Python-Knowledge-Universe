<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <text x="210" y="40" font-family="Arial" font-size="24" fill="#1e293b" font-weight="bold">CETAK BIRU LOGIKA (PATTERNS)</text>

  <!-- Input Area -->
  <rect x="50" y="80" width="150" height="400" rx="10" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="75" y="110" font-family="Arial" font-size="16" fill="#475569" font-weight="bold">DATA MATA</text>
  <text x="70" y="150" font-family="Arial" font-size="12" fill="#64748b">[Item 1]</text>
  <text x="70" y="180" font-family="Arial" font-size="12" fill="#64748b">[Item 2]</text>
  <text x="70" y="210" font-family="Arial" font-size="12" fill="#64748b">[Item 3]</text>

  <!-- Patterns / Machines -->
  
  <!-- Accumulator -->
  <g transform="translate(300, 100)">
    <rect width="200" height="100" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
    <text x="40" y="30" font-family="Arial" font-size="16" fill="#166534" font-weight="bold">AKUMULATOR</text>
    <text x="20" y="60" font-family="Arial" font-size="12" fill="#166534">Ember : total = total + item</text>
  </g>

  <!-- Filter -->
  <g transform="translate(300, 250)">
    <rect width="200" height="100" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="2" />
    <text x="60" y="30" font-family="Arial" font-size="16" fill="#854d0e" font-weight="bold">AYAKAN</text>
    <text x="25" y="60" font-family="Arial" font-size="12" fill="#854d0e">if syarat : hasil.append(item)</text>
  </g>

  <!-- Search -->
  <g transform="translate(300, 400)">
    <rect width="200" height="100" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
    <text x="60" y="30" font-family="Arial" font-size="16" fill="#991b1b" font-weight="bold">DETEKTIF</text>
    <text x="25" y="60" font-family="Arial" font-size="12" fill="#991b1b">if item == target : break</text>
  </g>

  <!-- Arrows -->
  <path d="M 200 150 L 300 150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 200 300 L 300 300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 200 450 L 300 450" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="320" y="580" font-family="Arial" font-size="14" fill="#94a3b8">© Python Knowledge Universe - Logic Blueprints</text>
</svg>
