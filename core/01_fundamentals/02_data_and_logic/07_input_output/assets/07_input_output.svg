<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <text x="250" y="40" font-family="Arial" font-size="24" fill="#1e293b" font-weight="bold">MEJA RESEPSIONIS PYTHON (I/O)</text>

  <!-- The Receptionist (Program) -->
  <g transform="translate(300, 200)">
    <rect width="200" height="250" rx="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="4" />
    <text x="40" y="40" font-family="Arial" font-size="18" fill="#1e40af" font-weight="bold">RESEPSIONIS</text>
    
    <!-- Mouth/Ear icons -->
    <circle cx="100" cy="100" r="30" fill="white" stroke="#3b82f6" />
    <path d="M 85 100 Q 100 120 115 100" fill="none" stroke="#3b82f6" stroke-width="2" />
  </g>

  <!-- Input (Tamu) -->
  <g transform="translate(50, 250)">
    <rect width="180" height="120" rx="10" fill="#e2e8f0" stroke="#94a3b8" />
    <text x="45" y="30" font-family="Arial" font-size="16" fill="#475569" font-weight="bold">TAMU (User)</text>
    <path d="M 190 60 L 250 60" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow_blue)" />
    <text x="195" y="50" font-family="Arial" font-size="14" fill="#3b82f6" font-weight="bold">input()</text>
  </g>

  <!-- Output (Jawaban) -->
  <g transform="translate(550, 250)">
    <rect width="180" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" />
    <text x="40" y="30" font-family="Arial" font-size="16" fill="#166534" font-weight="bold">JAWABAN</text>
    <path d="M -50 60 L -10 60" stroke="#22c55e" stroke-width="4" marker-start="url(#arrow_green)" />
    <text x="-45" y="50" font-family="Arial" font-size="14" fill="#22c55e" font-weight="bold">print()</text>
  </g>

  <!-- Arrowheads -->
  <defs>
    <marker id="arrow_blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#3b82f6" />
    </marker>
    <marker id="arrow_green" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto">
      <path d="M0,5 L10,0 L10,10 Z" fill="#22c55e" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="320" y="580" font-family="Arial" font-size="14" fill="#94a3b8">© Python Knowledge Universe - Receptionist System</text>
</svg>
