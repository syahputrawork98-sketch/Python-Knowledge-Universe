<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />

  <!-- The Labeled Engine (Function) -->
  <rect x="200" y="150" width="400" height="300" rx="20" fill="#f1f5f9" stroke="#3b82f6" stroke-width="5" />
  
  <!-- Documentation Label (Docstring) -->
  <path d="M 150 50 L 350 50 L 370 70 L 370 120 L 150 120 Z" fill="#fef9c3" stroke="#eab308" stroke-width="2" />
  <text x="170" y="80" font-family="Arial" font-size="14" fill="#854d0e" font-weight="bold">MANUAL (DOCSTRING)</text>
  <text x="170" y="100" font-family="Arial" font-size="11" fill="#a16207">"Menjelaskan APA dan BAGAIMANA"</text>
  <path d="M 360 120 L 400 180" stroke="#eab308" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Input Labels (Type Hints) -->
  <rect x="100" y="220" width="120" height="40" rx="5" fill="#10b981" />
  <text x="115" y="245" font-family="Courier New" font-size="14" fill="white" font-weight="bold">name: str</text>
  <text x="100" y="210" font-family="Arial" font-size="12" fill="#059669" font-style="italic">Type Hint</text>

  <rect x="100" y="300" width="120" height="40" rx="5" fill="#10b981" />
  <text x="115" y="325" font-family="Courier New" font-size="14" fill="white" font-weight="bold">age: int</text>

  <!-- Return Label -->
  <rect x="580" y="260" width="120" height="40" rx="5" fill="#3b82f6" />
  <text x="595" y="285" font-family="Courier New" font-size="14" fill="white" font-weight="bold">-> bool</text>
  <text x="580" y="250" font-family="Arial" font-size="12" fill="#2563eb" font-style="italic">Return Type</text>

  <!-- Comments (The "Why") -->
  <text x="320" y="400" font-family="Courier New" font-size="14" fill="#64748b"># Fix for bug #102</text>
  <text x="320" y="420" font-family="Arial" font-size="12" fill="#94a3b8" font-style="italic">(Comment: explains WHY)</text>

  <!-- help() utility -->
  <circle cx="700" cy="100" r="50" fill="#3b82f6" opacity="0.1" />
  <text x="685" y="110" font-family="Arial" font-size="30" fill="#3b82f6" font-weight="bold">?</text>
  <text x="660" y="165" font-family="Courier New" font-size="14" fill="#1e40af">help(obj)</text>

  <!-- Footer -->
  <text x="300" y="580" font-family="Arial" font-size="14" fill="#94a3b8">© Python Knowledge Universe - Documentation Basics</text>
</svg>
