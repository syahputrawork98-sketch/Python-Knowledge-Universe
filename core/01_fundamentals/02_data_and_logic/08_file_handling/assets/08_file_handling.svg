<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />
  
  <text x="280" y="40" font-family="Arial" font-size="24" fill="#1e293b" font-weight="bold">SISTEM ARSIP PYTHON (I/O)</text>

  <!-- Hard Drive (The Warehouse) -->
  <rect x="500" y="100" width="250" height="400" rx="15" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" />
  <text x="560" y="130" font-family="Arial" font-size="16" fill="#475569" font-weight="bold">HARDDISK (Gudang)</text>
  
  <!-- Filing Cabinets inside HD -->
  <rect x="530" y="160" width="190" height="60" rx="5" fill="#cbd5e1" stroke="#94a3b8" />
  <text x="540" y="195" font-family="Arial" font-size="12" fill="#475569">Buku A: data.txt</text>
  
  <rect x="530" y="240" width="190" height="60" rx="5" fill="#cbd5e1" stroke="#94a3b8" />
  <text x="540" y="275" font-family="Arial" font-size="12" fill="#475569">Buku B: log.txt</text>

  <!-- The Digital Secretary (The Python Script) -->
  <g transform="translate(100, 200)">
    <rect width="250" height="200" rx="15" fill="#f1f5f9" stroke="#3b82f6" stroke-width="4" />
    <text x="45" y="40" font-family="Arial" font-size="18" fill="#1e40af" font-weight="bold">SEKRETARIS (Python)</text>
    
    <!-- Action Icons -->
    <rect x="30" y="70" width="190" height="100" rx="10" fill="white" stroke="#3b82f6" stroke-dasharray="5,5" />
    <text x="80" y="100" font-family="Arial" font-size="14" fill="#3b82f6">with open():</text>
    <text x="60" y="130" font-family="Arial" font-size="12" fill="#1e40af" font-weight="bold">AUTOMATIC HANDLER</text>
  </g>

  <!-- Interaction Arrows -->
  <!-- Opening (r/w/a) -->
  <path d="M 350 250 L 500 250" stroke="#3b82f6" stroke-width="6" marker-end="url(#arrow_blue)" />
  <text x="375" y="235" font-family="Arial" font-size="14" fill="#3b82f6" font-weight="bold">open('r', 'w', 'a')</text>

  <!-- Data Flow Back -->
  <path d="M 500 350 L 350 350" stroke="#10b981" stroke-width="6" marker-end="url(#arrow_green)" />
  <text x="390" y="380" font-family="Arial" font-size="14" fill="#10b981" font-weight="bold">read() / write()</text>

  <!-- Automatic Closing -->
  <path d="M 350 420 L 500 420" stroke="#ef4444" stroke-width="4" stroke-dasharray="10,5" marker-end="url(#arrow_red)" />
  <text x="370" y="450" font-family="Arial" font-size="12" fill="#ef4444" font-weight="bold">Automatic .close() via 'with'</text>

  <!-- Arrowheads -->
  <defs>
    <marker id="arrow_blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#3b82f6" />
    </marker>
    <marker id="arrow_green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#10b981" />
    </marker>
    <marker id="arrow_red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Footer -->
  <text x="320" y="580" font-family="Arial" font-size="14" fill="#94a3b8">© Python Knowledge Universe - Digital Secretary</text>
</svg>
