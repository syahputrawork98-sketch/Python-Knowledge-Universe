<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" />

  <!-- Title -->
  <text x="50" y="60" font-family="Arial" font-size="24" fill="#1e40af" font-weight="bold">STRING MANIPULATION</text>
  <text x="50" y="85" font-family="Arial" font-size="16" fill="#3b82f6" font-style="italic">"Untaian Manik-Manik &amp; Rangkaian Kereta"</text>

  <!-- The String Train -->
  <g transform="translate(100, 200)">
    <!-- Character Boxes -->
    <rect x="0" y="50" width="80" height="80" rx="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="3" />
    <text x="30" y="100" font-family="Courier New" font-size="40" fill="#1e40af" font-weight="bold">P</text>
    <text x="35" y="150" font-family="Arial" font-size="14" fill="#94a3b8">0</text>

    <rect x="90" y="50" width="80" height="80" rx="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="3" />
    <text x="120" y="100" font-family="Courier New" font-size="40" fill="#1e40af" font-weight="bold">Y</text>
    <text x="125" y="150" font-family="Arial" font-size="14" fill="#94a3b8">1</text>

    <rect x="180" y="50" width="80" height="80" rx="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="3" />
    <text x="210" y="100" font-family="Courier New" font-size="40" fill="#1e40af" font-weight="bold">T</text>
    <text x="215" y="150" font-family="Arial" font-size="14" fill="#94a3b8">2</text>

    <rect x="270" y="50" width="80" height="80" rx="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="3" />
    <text x="300" y="100" font-family="Courier New" font-size="40" fill="#1e40af" font-weight="bold">H</text>
    <text x="305" y="150" font-family="Arial" font-size="14" fill="#94a3b8">3</text>

    <rect x="360" y="50" width="80" height="80" rx="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="3" />
    <text x="390" y="100" font-family="Courier New" font-size="40" fill="#1e40af" font-weight="bold">O</text>
    <text x="395" y="150" font-family="Arial" font-size="14" fill="#94a3b8">4</text>

    <rect x="450" y="50" width="80" height="80" rx="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="3" />
    <text x="480" y="100" font-family="Courier New" font-size="40" fill="#1e40af" font-weight="bold">N</text>
    <text x="485" y="150" font-family="Arial" font-size="14" fill="#94a3b8">5</text>
  </g>

  <!-- Slicing Visualization [1:4] -->
  <rect x="185" y="240" width="260" height="100" rx="15" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="8,8" />
  <text x="230" y="370" font-family="Arial" font-size="18" fill="#ef4444" font-weight="bold">SLICING [1:4]</text>
  <text x="235" y="390" font-family="Arial" font-size="14" fill="#ef4444" font-style="italic">Hasil: "YTH"</text>

  <!-- Immutability Shield -->
  <circle cx="650" cy="450" r="60" fill="#1e40af" opacity="0.1" />
  <path d="M 650 400 L 680 430 L 650 460 L 620 430 Z" fill="#1e40af" />
  <text x="580" y="530" font-family="Arial" font-size="16" fill="#1e40af" font-weight="bold">IMMUTABILITY</text>
  <text x="570" y="550" font-family="Arial" font-size="12" fill="#64748b">Original can't be changed!</text>

  <!-- Footer -->
  <text x="300" y="580" font-family="Arial" font-size="14" fill="#94a3b8">© Python Knowledge Universe - String Manipulation</text>
</svg>
