<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ebf8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bee3f8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" rx="20" fill="url(#skyGrad)" />

  <!-- Tightrope -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="#4a5568" stroke-width="4" stroke-dasharray="10,5" />
  
  <!-- Safety Net -->
  <g transform="translate(150, 250)">
    <rect width="500" height="60" rx="10" fill="none" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,5" />
    <path d="M0 0 L500 0 M0 20 L500 20 M0 40 L500 40" stroke="#e53e3e" stroke-width="1" opacity="0.3" />
    <path d="M50 0 L50 60 M150 0 L150 60 M250 0 L250 60 M350 0 L350 60 M450 0 L450 60" stroke="#e53e3e" stroke-width="1" opacity="0.3" />
    <text x="250" y="35" font-family="Arial" font-size="18" fill="#e53e3e" text-anchor="middle" font-weight="bold">JARING PENGAMAN (EXCEPTION HANDLING)</text>
  </g>

  <!-- Alarm Icon -->
  <g transform="translate(650, 50)">
    <circle cx="30" cy="30" r="25" fill="#e53e3e" />
    <path d="M30 15 L30 35 M30 45 L30 47" stroke="white" stroke-width="4" stroke-linecap="round" />
    <text x="30" y="75" font-family="Arial" font-size="12" fill="#c53030" text-anchor="middle" font-weight="bold">ALARM</text>
  </g>

  <text x="400" y="100" font-family="Arial" font-size="20" fill="#2d3748" text-anchor="middle" font-weight="bold">LOGIKA PROGRAM</text>
  
  <text x="400" y="370" font-family="Arial" font-size="16" fill="#4a5568" text-anchor="middle">"Error handling is about safe recovery, not just silencing crashes."</text>
</svg>
