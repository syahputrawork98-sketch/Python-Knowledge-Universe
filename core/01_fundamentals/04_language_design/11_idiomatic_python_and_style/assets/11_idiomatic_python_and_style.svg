<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fff4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c6f6d5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" rx="20" fill="url(#grassGrad)" />

  <!-- The Winding Highway (Non-idiomatic) -->
  <g transform="translate(50, 50)">
    <path d="M0 50 Q 150 0 300 100 T 600 50" fill="none" stroke="#718096" stroke-width="40" stroke-linecap="round" />
    <path d="M0 50 Q 150 0 300 100 T 600 50" fill="none" stroke="white" stroke-width="2" stroke-dasharray="10,10" />
    <text x="300" y="180" font-family="Arial" font-size="16" fill="#4a5568" text-anchor="middle" font-weight="bold">GAYA BAHASA LAIN (Verbose)</text>
    <!-- Cars (abstract) -->
    <rect x="50" y="30" width="20" height="10" fill="#e53e3e" />
    <rect x="250" y="70" width="20" height="10" fill="#3182ce" />
  </g>

  <!-- The Pythonic Shortcut (Idiomatic) -->
  <g transform="translate(50, 250)">
    <path d="M0 40 L600 40" fill="none" stroke="#38a169" stroke-width="30" stroke-linecap="round" />
    <text x="300" y="90" font-family="Arial" font-size="16" fill="#22543d" text-anchor="middle" font-weight="bold">GAYA PYTHONIC (Idiomatic)</text>
    <path d="M100 40 L120 20 L140 40 L120 60 Z" fill="#f6e05e" />
    <path d="M400 40 L420 20 L440 40 L420 60 Z" fill="#f6e05e" />
  </g>
  
  <text x="400" y="370" font-family="Arial" font-size="16" fill="#2d3748" text-anchor="middle">"Pythonic code is the most direct path between thought and execution."</text>
</svg>
