<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="400" rx="20" fill="url(#bgGrad)" />

  <!-- Left Side: Master Plan -->
  <rect x="50" y="80" width="320" height="240" rx="15" fill="#ffffff" filter="url(#shadow)" />
  <rect x="50" y="80" width="320" height="60" rx="15" fill="#3498db" />
  <text x="210" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">MASTER PLAN</text>
  <text x="210" y="115" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.8">(Model Akademik)</text>
  
  <path d="M100 180 L320 180 M100 220 L320 220 M100 260 L240 260" stroke="#dee2e6" stroke-width="4" stroke-linecap="round" />
  <circle cx="100" cy="180" r="4" fill="#3498db" />
  <circle cx="100" cy="220" r="4" fill="#3498db" />
  <circle cx="100" cy="260" r="4" fill="#3498db" />
  
  <!-- Right Side: Resep Masakan -->
  <rect x="430" y="80" width="320" height="240" rx="15" fill="#ffffff" filter="url(#shadow)" />
  <rect x="430" y="80" width="320" height="60" rx="15" fill="#e67e22" />
  <text x="590" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">RESEP MASAKAN</text>
  <text x="590" y="115" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.8">(Model Praktis)</text>

  <rect x="470" y="170" width="60" height="10" rx="5" fill="#f39c12" opacity="0.4" />
  <rect x="470" y="195" width="240" height="8" rx="4" fill="#ced4da" />
  <rect x="470" y="220" width="200" height="8" rx="4" fill="#ced4da" />
  <rect x="470" y="245" width="220" height="8" rx="4" fill="#ced4da" />
  
  <!-- Interaction/VS -->
  <circle cx="400" cy="200" r="40" fill="#343a40" filter="url(#shadow)" />
  <text x="400" y="212" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">VS</text>
  
  <!-- Footer -->
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="16" fill="#6c757d" text-anchor="middle" font-style="italic">"Dari teori kaku menuju eksekusi yang lezat dan nyata."</text>
</svg>
