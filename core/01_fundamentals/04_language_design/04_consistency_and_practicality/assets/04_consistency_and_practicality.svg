<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="20" fill="#ffffff" stroke="#f1f3f5" stroke-width="2" />

  <!-- Lego Blocks (Consistency) -->
  <g transform="translate(100, 100)">
    <rect x="0" y="100" width="100" height="40" rx="5" fill="#3498db" />
    <circle cx="25" cy="100" r="5" fill="#2980b9" />
    <circle cx="75" cy="100" r="5" fill="#2980b9" />
    
    <rect x="25" y="60" width="100" height="40" rx="5" fill="#e74c3c" />
    <circle cx="50" cy="60" r="5" fill="#c0392b" />
    <circle cx="100" cy="60" r="5" fill="#c0392b" />

    <text x="75" y="180" font-family="Arial" font-size="16" fill="#34495e" text-anchor="middle" font-weight="bold">CONSISTENCY</text>
    <text x="75" y="195" font-family="Arial" font-size="10" fill="#95a5a6" text-anchor="middle">(Pola yang Sama)</text>
  </g>

  <!-- Swiss Army Knife (Practicality) -->
  <g transform="translate(500, 100)">
    <rect x="0" y="60" width="160" height="60" rx="30" fill="#c0392b" />
    <!-- Tools popping out -->
    <path d="M40 60 L20 10 L60 20 Z" fill="#bdc3c7" />
    <path d="M120 60 L140 10 L100 20 Z" fill="#bdc3c7" />
    
    <circle cx="30" cy="90" r="5" fill="white" />
    <text x="80" y="180" font-family="Arial" font-size="16" fill="#34495e" text-anchor="middle" font-weight="bold">PRACTICALITY</text>
    <text x="80" y="195" font-family="Arial" font-size="10" fill="#95a5a6" text-anchor="middle">(Tujuan Nyata)</text>
  </g>

  <g transform="translate(350, 150)">
    <path d="M0 50 Q 50 0 100 50" stroke="#bdc3c7" stroke-width="2" fill="none" stroke-dasharray="5,5" />
    <text x="50" y="80" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">Balance</text>
  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#6c757d" text-anchor="middle">"Consistency is the foundation, Practicality is the goal."</text>
</svg>
