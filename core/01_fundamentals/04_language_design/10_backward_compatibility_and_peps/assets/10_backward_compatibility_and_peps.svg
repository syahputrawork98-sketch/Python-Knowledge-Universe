<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
    </marker>
  </defs>

  <rect width="800" height="400" rx="20" fill="#ffffff" />

  <!-- Idea / Proposal -->
  <g transform="translate(50, 150)">
    <rect width="100" height="130" rx="5" fill="#f7fafc" stroke="#cbd5e0" stroke-width="2" />
    <path d="M20 30 L80 30 M20 50 L80 50 M20 70 L60 70" stroke="#a0aec0" stroke-width="2" />
    <text x="50" y="155" font-family="Arial" font-size="14" fill="#4a5568" text-anchor="middle" font-weight="bold">PROPOSAL (PEP)</text>
  </g>

  <!-- Community Funnel -->
  <g transform="translate(250, 150)">
    <path d="M0 0 L300 0 L250 150 L50 150 Z" fill="#ebf8ff" stroke="#3182ce" stroke-width="2" opacity="0.5" />
    <text x="150" y="60" font-family="Arial" font-size="16" fill="#2b6cb0" text-anchor="middle" font-weight="bold">HUBUNGAN KOMUNITAS</text>
    <text x="150" y="85" font-family="Arial" font-size="12" fill="#2c5282" text-anchor="middle">(Diskusi, Kritik, Debat)</text>
    
    <!-- Avatars in the funnel -->
    <circle cx="100" cy="110" r="10" fill="#3182ce" />
    <circle cx="200" cy="110" r="10" fill="#3182ce" />
    <circle cx="150" cy="120" r="10" fill="#3182ce" />
  </g>

  <!-- Approved Standard -->
  <g transform="translate(620, 150)">
    <rect width="100" height="130" rx="5" fill="#f0fff4" stroke="#48bb78" stroke-width="2" />
    <path d="M20 30 L80 30 L80 100 L20 100 Z" fill="#c6f6d5" opacity="0.5" />
    <path d="M35 65 L45 75 L65 55" stroke="#2f855a" stroke-width="5" fill="none" />
    <text x="50" y="155" font-family="Arial" font-size="14" fill="#2f855a" text-anchor="middle" font-weight="bold">STANDAR RESMI</text>
  </g>

  <!-- Arrows -->
  <line x1="160" y1="215" x2="240" y2="215" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="560" y1="215" x2="610" y2="215" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <text x="400" y="370" font-family="Arial" font-size="16" fill="#4a5568" text-anchor="middle">"Python evolves through consensus, not dictation."</text>
</svg>
