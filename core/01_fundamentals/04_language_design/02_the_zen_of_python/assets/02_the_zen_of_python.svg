<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="400" rx="20" fill="url(#navGrad)" />

  <!-- Navigation Map (Rules) -->
  <g transform="translate(100, 100)">
    <rect width="200" height="200" rx="10" fill="none" stroke="#7f8c8d" stroke-dasharray="5,5" />
    <path d="M20 180 Q 50 100 180 20" stroke="#f1c40f" stroke-width="3" fill="none" />
    <text x="180" y="15" font-family="Arial" font-size="20" fill="#f1c40f">X</text>
    <text x="100" y="230" font-family="Arial" font-size="14" fill="white" text-anchor="middle">ATURAN SINTAKS</text>
    <text x="100" y="245" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">(Navigation Map)</text>
  </g>

  <!-- Moral Compass (Philosophy) -->
  <g transform="translate(500, 100)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="#2ecc71" stroke-width="4" />
    <circle cx="100" cy="100" r="5" fill="#2ecc71" />
    <!-- Needle -->
    <path d="M100 40 L110 100 L100 160 L90 100 Z" fill="#e74c3c" transform="rotate(25, 100, 100)" />
    <text x="100" y="230" font-family="Arial" font-size="14" fill="white" text-anchor="middle">FILOSOFI ZEN</text>
    <text x="100" y="245" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">(Moral Compass)</text>
  </g>

  <!-- Center Connection -->
  <text x="400" y="200" font-family="Arial" font-size="40" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">ZEN</text>
  
  <text x="400" y="370" font-family="Arial" font-size="16" fill="#bdc3c7" text-anchor="middle">"Sintaks mengarahkan jari, Zen mengarahkan hati."</text>
</svg>
