<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" rx="20" fill="#ffffff" />

  <!-- Clay Box (Mutable) -->
  <g transform="translate(150, 120)">
    <rect width="180" height="150" rx="10" fill="url(#clayGrad)" />
    <!-- Impression marks to show it can be molded -->
    <circle cx="40" cy="40" r="15" fill="black" opacity="0.1" />
    <circle cx="140" cy="110" r="20" fill="black" opacity="0.1" />
    <text x="90" y="190" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">MUTABLE</text>
    <text x="90" y="210" font-family="Arial" font-size="12" fill="#fed7aa" text-anchor="middle">(Tanah Liat - Bisa Berubah)</text>
  </g>

  <!-- Ice Box (Immutable) -->
  <g transform="translate(470, 120)">
    <rect width="180" height="150" rx="5" fill="url(#iceGrad)" />
    <!-- Ice sparkles -->
    <rect x="20" y="20" width="40" height="5" fill="white" opacity="0.3" transform="rotate(45, 40, 22.5)" />
    <rect x="120" y="100" width="30" height="5" fill="white" opacity="0.3" transform="rotate(-30, 135, 102.5)" />
    <text x="90" y="190" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="bold">IMMUTABLE</text>
    <text x="90" y="210" font-family="Arial" font-size="12" fill="#bae6fd" text-anchor="middle">(Balok Es - Tetap)</text>
  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#64748b" text-anchor="middle">"Mutable for flexibility, Immutable for safety."</text>
</svg>
