<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" rx="20" fill="#f8f9fa" />

  <!-- The Swiss Army Knife (Python StdLib) -->
  <g transform="translate(300, 150)" filter="url(#shadowFilter)">
    <!-- Red Body -->
    <rect x="0" y="0" width="200" height="60" rx="30" fill="#e53e3e" />
    <circle cx="30" cy="30" r="10" fill="white" stroke="#c53030" stroke-width="2" />
    
    <!-- Tools -->
    <g transform="translate(40, -40)">
      <path d="M0 40 L0 0 Q 30 0 30 40" fill="#cbd5e0" stroke="#718096" stroke-width="1" />
      <text x="15" y="-10" font-family="Arial" font-size="10" fill="#4a5568" text-anchor="middle">math</text>
    </g>
    <g transform="translate(80, -60)">
      <path d="M0 60 L0 0 L20 0 L20 60" fill="#a0aec0" stroke="#718096" stroke-width="1" />
      <text x="10" y="-10" font-family="Arial" font-size="10" fill="#4a5568" text-anchor="middle">json</text>
    </g>
    <g transform="translate(120, -50)">
      <path d="M0 50 L0 0 Q 40 0 40 50" fill="#edf2f7" stroke="#718096" stroke-width="1" />
      <text x="20" y="-10" font-family="Arial" font-size="10" fill="#4a5568" text-anchor="middle">os</text>
    </g>
    <g transform="translate(160, -30)">
      <circle cx="0" cy="30" r="20" fill="none" stroke="#718096" stroke-width="2" />
      <text x="0" y="5" font-family="Arial" font-size="10" fill="#4a5568" text-anchor="middle">csv</text>
    </g>

    <text x="100" y="100" font-family="Arial" font-size="20" fill="#2d3748" text-anchor="middle" font-weight="bold">STANDARD LIBRARY</text>
    <text x="100" y="120" font-family="Arial" font-size="12" fill="#718096" text-anchor="middle">(Batteries Included)</text>
  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#4a5568" text-anchor="middle">"Python provides the tools you need, right out of the box."</text>
</svg>
