<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" rx="20" fill="#fdfdfd" stroke="#f1f3f5" stroke-width="2" />

  <!-- The "Riddle" side (Low Readability) -->
  <g transform="translate(100, 80)">
    <rect width="200" height="240" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" />
    <path d="M40 60 L160 60 L100 120 L160 180 L40 180 Z" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linejoin="round" />
    <text x="100" y="270" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle" font-weight="bold">KODE SEBAGAI TEKA-TEKI</text>
    <text x="100" y="285" font-family="Arial" font-size="10" fill="#adb5bd" text-anchor="middle">(Implicit / Cryptic)</text>
    <!-- Abstract cryptic shapes -->
    <rect x="50" y="80" width="20" height="20" fill="#e74c3c" opacity="0.2" />
    <circle cx="150" cy="150" r="15" fill="#e74c3c" opacity="0.2" />
  </g>

  <!-- The "Book" side (High Readability) -->
  <g transform="translate(500, 80)">
    <rect width="200" height="240" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1" filter="url(#dropShadow)" />
    <!-- Book lines -->
    <path d="M40 60 L160 60 M40 90 L160 90 M40 120 L120 120 M40 150 L160 150 M40 180 L140 180" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" />
    <text x="100" y="270" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle" font-weight="bold">KODE SEBAGAI CERITA</text>
    <text x="100" y="285" font-family="Arial" font-size="10" fill="#adb5bd" text-anchor="middle">(Readable / Explicit)</text>
  </g>

  <path d="M350 200 L450 200" stroke="#dee2e6" stroke-width="2" stroke-dasharray="8,8" />
  <text x="400" y="190" font-family="Arial" font-size="30" font-weight="bold" fill="#adb5bd" text-anchor="middle">→</text>
  
  <text x="400" y="370" font-family="Arial" font-size="16" fill="#6c757d" text-anchor="middle">"Explicit is Better than Implicit."</text>
</svg>
