<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lightGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" rx="20" fill="#2c3e50" />

  <!-- The Club Entrance -->
  <g transform="translate(150, 80)">
    <rect width="500" height="240" rx="10" fill="#34495e" stroke="#ecf0f1" stroke-width="2" />
    <rect x="200" y="40" width="100" height="200" fill="#2c3e50" stroke="#ecf0f1" stroke-width="2" />
    <text x="250" y="30" font-family="Arial" font-size="24" fill="#f1c40f" text-anchor="middle" filter="url(#lightGlow)" font-weight="bold">SALSA CLUB</text>
    
    <!-- Candidate 1: Degree -->
    <g transform="translate(50, 100)">
      <circle cx="30" cy="30" r="25" fill="#95a5a6" />
      <rect x="0" y="60" width="60" height="20" rx="5" fill="#e74c3c" />
      <text x="30" y="74" font-family="Arial" font-size="10" fill="white" text-anchor="middle">STRICT TYPE</text>
      <text x="30" y="55" font-family="Arial" font-size="8" fill="#bdc3c7" text-anchor="middle">"Punya Gelar"</text>
    </g>

    <!-- Candidate 2: Dancer -->
    <g transform="translate(380, 100)">
      <circle cx="30" cy="34" r="25" fill="#f1c40f" filter="url(#lightGlow)" />
      <rect x="0" y="60" width="60" height="20" rx="5" fill="#2ecc71" />
      <text x="30" y="74" font-family="Arial" font-size="10" fill="white" text-anchor="middle">DUCK TYPE</text>
      <text x="30" y="55" font-family="Arial" font-size="8" fill="#f1c40f" text-anchor="middle">"Bisa Menari"</text>
    </g>

    <text x="250" y="150" font-family="Arial" font-size="14" fill="#ecf0f1" text-anchor="middle">Jika ia bisa menari Salsa, ia boleh masuk!</text>
  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#bdc3c7" text-anchor="middle">"Program to behavior, not to identity."</text>
</svg>
