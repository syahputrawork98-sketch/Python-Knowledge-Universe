<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="20" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2" />

  <!-- Stairs (Simple) -->
  <g transform="translate(100, 100)">
    <path d="M0 200 L40 200 L40 160 L80 160 L80 120 L120 120 L120 80 L160 80 L160 40 L200 40" stroke="#2ecc71" stroke-width="6" fill="none" stroke-linejoin="round" />
    <text x="100" y="240" font-family="Arial" font-size="16" fill="#2c3e50" text-anchor="middle" font-weight="bold">SIMPLE (TANGGA)</text>
    <text x="100" y="255" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">"Langsung, Terlihat, Aman"</text>
  </g>

  <!-- Elevator (Complex) -->
  <g transform="translate(500, 100)">
    <!-- Shaft -->
    <rect x="50" y="20" width="100" height="200" fill="none" stroke="#dee2e6" stroke-width="2" stroke-dasharray="4,4" />
    <!-- Elevator Car -->
    <rect x="60" y="100" width="80" height="80" rx="5" fill="#3498db" />
    <rect x="95" y="100" width="10" height="80" fill="#2980b9" />
    <!-- Cables and Motor -->
    <path d="M100 20 L100 100" stroke="#7f8c8d" stroke-width="2" />
    <circle cx="100" cy="15" r="10" fill="#34495e" />
    
    <text x="100" y="240" font-family="Arial" font-size="16" fill="#2c3e50" text-anchor="middle" font-weight="bold">COMPLEX (LIFT)</text>
    <text x="100" y="255" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">"Otomatis, Tapi Rumit Di Balik Layar"</text>
  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#6c757d" text-anchor="middle">"Simple is better than complex."</text>
</svg>
