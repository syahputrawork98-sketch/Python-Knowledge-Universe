<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Control Flow Big Picture</title>
  <desc id="desc">Diagram konsep utama untuk bab Control Flow.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect x="60" y="200" width="230" height="120" rx="12" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="175" y="265" text-anchor="middle" font-size="20" font-family="Segoe UI" fill="#1e3a8a">Input</text>
  <rect x="365" y="200" width="230" height="120" rx="12" fill="#e0f2fe" stroke="#0369a1"/>
  <text x="480" y="265" text-anchor="middle" font-size="20" font-family="Segoe UI" fill="#0c4a6e">Process</text>
  <rect x="670" y="200" width="230" height="120" rx="12" fill="#dcfce7" stroke="#15803d"/>
  <text x="785" y="265" text-anchor="middle" font-size="20" font-family="Segoe UI" fill="#14532d">Output</text>
  <line x1="290" y1="260" x2="365" y2="260" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="595" y1="260" x2="670" y2="260" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="80" text-anchor="middle" font-size="30" font-family="Segoe UI" fill="#0f172a">Control Flow</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
